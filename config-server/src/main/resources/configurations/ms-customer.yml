server:
  port: 8081

spring:
  application:
    name: ms-customer
  datasource:
    url: jdbc:postgresql://postgres-customer:5432/db_customer
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: basic
          ms-menu:
            connectTimeout: 3000
            readTimeout: 3000
            loggerLevel: basic

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/

springdoc:
  api-docs:
    path: /api/customers/v3/api-docs
