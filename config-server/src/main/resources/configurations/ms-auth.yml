server:
  port: 8087

spring:
  application:
    name: ms-auth
  datasource:
    url: jdbc:postgresql://postgres-auth:5432/db_auth
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: basic

jwt:
  secret: 3c9e45c4a719468532f18378d3840e6c6d042cf768d6d67b2d56193e433f48a1
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/

springdoc:
  api-docs:
    path: /api/auth/v3/api-docs
