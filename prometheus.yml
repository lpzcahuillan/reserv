global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'service-registry'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['service-registry:8761']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'ms-customer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-customer:8081']

  - job_name: 'ms-table'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-table:8082']

  - job_name: 'ms-reservation'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-reservation:8083']

  - job_name: 'ms-queue'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-queue:8084']

  - job_name: 'ms-menu'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-menu:8085']

  - job_name: 'ms-order'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-order:8086']

  - job_name: 'ms-auth'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-auth:8087']

  - job_name: 'ms-notification'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ms-notification:8088']
